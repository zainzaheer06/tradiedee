{% extends "base.html" %}

{% block title %}Login - Nevox AI{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 via-white to-blue-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md">
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-xl mx-auto mb-4">
                <i class="bi bi-telephone-fill text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-900">Nevox AI</h1>
            <p class="text-gray-600 mt-2">Sign in to your account</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <form method="POST" class="p-6 space-y-6">
                <!-- Username -->
                <div>
                    <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">
                        Username
                        <span class="text-red-500">*</span>
                    </label>
                    <input type="text" id="username" name="username" required
                           placeholder="Enter your username"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-colors"
                           value="{{ request.form.get('username', '') }}">
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
                        Password
                        <span class="text-red-500">*</span>
                    </label>
                    <input type="password" id="password" name="password" required
                           placeholder="Enter your password"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-colors">
                </div>

                <!-- Login Button -->
                <button type="submit" class="w-full px-4 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-semibold transition-colors btn-hover flex items-center justify-center gap-2">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="px-6 py-4 border-t border-gray-200">
                <p class="text-center text-gray-600">
                    Don't have an account?
                    <a href="{{ url_for('core.signup') }}" class="text-indigo-600 hover:text-indigo-700 font-semibold transition-colors">
                        Sign up here
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
