{% extends "errors/base_error.html" %}

{% block title %}Page Not Found - Nevox AI{% endblock %}

{% block error_content %}
<!-- Error Icon -->
<div class="mb-6">
    <div class="mx-auto w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center">
        <i class="bi bi-exclamation-triangle text-gray-600 text-2xl"></i>
    </div>
</div>

<!-- Error Message -->
<h2 class="text-3xl font-bold text-gray-900 mb-2">404</h2>
<h3 class="text-xl font-semibold text-gray-700 mb-4">Page Not Found</h3>
<p class="text-gray-600 mb-6">
    The page you're looking for doesn't exist or has been moved.
</p>
{% endblock %}
