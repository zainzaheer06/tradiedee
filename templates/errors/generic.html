{% extends "errors/base_error.html" %}

{% block title %}Error {{ error_code }} - Tradiedee{% endblock %}

{% block error_content %}
<!-- Error Icon -->
<div class="mb-6">
    <div class="mx-auto w-16 h-16 bg-red-100 rounded-full flex items-center justify-center">
        <i class="bi bi-x-circle text-red-600 text-2xl"></i>
    </div>
</div>

<!-- Error Message -->
<h2 class="text-3xl font-bold text-gray-900 mb-2">{{ error_code }}</h2>
<h3 class="text-xl font-semibold text-gray-700 mb-4">{{ error_name }}</h3>
<p class="text-gray-600 mb-6">
    {{ error_description }}
</p>

<!-- Error ID for tracking -->
{% if error_id %}
<div class="mt-6 p-3 bg-gray-100 rounded text-sm">
    <p class="text-gray-500">Error ID: <code class="text-gray-700">{{ error_id }}</code></p>
</div>
{% endif %}
{% endblock %}
